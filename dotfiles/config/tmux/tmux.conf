# Tmux configuration

# General settings
set -g default-shell /run/current-system/sw/bin/fish
set -g base-index 1
setw -g pane-base-index 1
set -g escape-time 0
set -g history-limit 1000000
set -g renumber-windows on
set -g set-clipboard on
set -g status-position top
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Mouse
set -g mouse off

# Vi mode
setw -g mode-keys vi
set -g status-keys emacs

# Prefix
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"

# Split windows
bind -n M-L split-window -h -c "#{pane_current_path}"
bind -n M-K split-window -v -c "#{pane_current_path}"

# Pane navigation (vim-like)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Window navigation
bind -r "<" swap-window -d -t -1
bind -r ">" swap-window -d -t +1

# Copy mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind P paste-buffer

# Kill pane
bind x kill-pane

# Popup
bind g display-popup -E "tmux has-session -t popup 2>/dev/null || tmux new-session -d -s popup -c '#{pane_current_path}'; tmux attach -t popup"
bind G display-popup -E -T "popup"

# Change session directory
bind -n M-C attach-session -c "#{pane_current_path}"

# Passthrough (for images in terminal)
set -g allow-passthrough on
set -gq allow-passthrough on

# Update environment
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

# Plugins config
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-strategy-nvim 'session'

# Visual
set -g visual-activity off

# New session/window in current directory
bind c new-window -c "#{pane_current_path}"
